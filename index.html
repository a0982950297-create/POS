<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>擺攤POS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== 導覽列 ===== -->
<div class="top-nav">
  <button onclick="showPage('pos')">POS</button>
  <button onclick="showPage('todayStats')">今日銷售</button>
  <button onclick="showPage('history')">今日紀錄</button>
  <button onclick="showPage('monthDaily')">本月每日</button>
  <button onclick="showPage('products')">商品管理</button>
</div>

<!-- ===== POS 主畫面 ===== -->
<div id="page-pos" class="page active">

  <div class="container">

    <!-- 左 -->
    <div class="left">
      <div id="categoryFilter"></div>
      <div id="posMenu"></div>
    </div>

    <!-- 右 -->
    <div class="right">

      <h3>訂單</h3>
      <div id="orderList"></div>

      <div class="total">
        $<span id="total">0</span>
      </div>

      <!-- 找零 -->
      <div class="cash-box">
        <input id="cashInput" placeholder="客人給" readonly onclick="openPad()">
        <div class="quick-cash">
          <button onclick="addCash(100)">+100</button>
          <button onclick="addCash(500)">+500</button>
          <button onclick="addCash(1000)">+1000</button>
          <button class="clear-btn" onclick="clearCash()">清除</button>
        </div>
        <div class="change">
          找零：<span id="change">0</span>
        </div>
      </div>

      <button class="checkout" onclick="checkout()">結帳</button>

      <!-- 保留你要的 -->
      <div class="report">
        今日：$<span id="todayRevenue">0</span>
        單數：<span id="todayOrders">0</span>
        銷售：<span id="todayQty">0</span>
      </div>

    </div>

  </div>

</div>

<!-- ===== 商品管理 ===== -->
<div id="page-products" class="page">
  <h2>商品管理</h2>

  <input id="name" placeholder="品項">
  <input id="price" type="number" placeholder="價格">
  <input id="category" placeholder="分類">
  <button onclick="addProduct()">新增</button>

  <div id="productList"></div>
</div>

<!-- ===== 今日銷售 ===== -->
<div id="page-todayStats" class="page">
  <h2>今日銷售</h2>
  <div id="productStats"></div>
</div>

<!-- ===== 本月每日 ===== -->
<div id="page-monthDaily" class="page">
  <h2>本月每日紀錄</h2>

  <div id="monthDaily"></div>

  <h3>本月商品銷售總數</h3>
  <div id="monthProductStats"></div>
</div>
<!-- ===== 今日紀錄 ===== -->
<div id="page-history" class="page">
  <h2>今日紀錄</h2>
  <div id="historyList"></div>
</div>

<script src="app.js"></script>

<div id="dayPanel" class="panel">
  <div class="panel-content">

    <div class="panel-header">
      <span id="panelTitle">明細</span>
      <button onclick="closePanel()">✕</button>
    </div>

    <div id="panelBody"></div>

  </div>
</div>

<div id="numPad" class="num-pad" onclick="closePadOutside(event)">

  <div class="pad" onclick="event.stopPropagation()">

    <button onclick="pressNum(1)">1</button>
    <button onclick="pressNum(2)">2</button>
    <button onclick="pressNum(3)">3</button>

    <button onclick="pressNum(4)">4</button>
    <button onclick="pressNum(5)">5</button>
    <button onclick="pressNum(6)">6</button>

    <button onclick="pressNum(7)">7</button>
    <button onclick="pressNum(8)">8</button>
    <button onclick="pressNum(9)">9</button>

    <button onclick="clearNum()">C</button>
    <button onclick="pressNum(0)">0</button>
    <button onclick="deleteOne()">⌫</button>

    <button class="confirm" onclick="closePad()">確定</button>

  </div>
</div>


<div id="undoBar" class="undo-bar">
  已刪除
  <button onclick="undoDelete()">復原</button>
</div>
</body>
</html>
